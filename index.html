<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Summary - Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; color: #333; }
  header { background: #333; color: #FFE600; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  header span { font-size: 12px; color: #aaa; }
  .filters { background: #fff; padding: 16px 32px; display: flex; gap: 24px; align-items: center; border-bottom: 2px solid #FFE600; }
  .filters label { font-weight: 600; font-size: 13px; color: #555; }
  .filters select { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; cursor: pointer; background: #fff; }
  .filters select:focus { outline: none; border-color: #FFE600; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; padding: 24px 32px; }
  .kpi { background: #fff; border-radius: 10px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #FFE600; }
  .kpi .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi .value { font-size: 26px; font-weight: 700; color: #333; }
  .kpi .sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 32px 24px; }
  .charts.single { grid-template-columns: 1fr; }
  .chart-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .chart-card h3 { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  .table-section { padding: 0 32px 32px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  th { background: #444; color: #fff; padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
  tr:nth-child(even) td { background: #fafafa; }
  tr.total td { background: #fffde7; font-weight: 700; }
  tr:hover td { background: #fff9e6; }
  .section-title { font-size: 15px; font-weight: 700; color: #333; margin: 0 0 12px; padding: 24px 32px 0; }
  footer { text-align: center; padding: 16px; font-size: 11px; color: #aaa; }
  @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<header>
  <h1>Card Summary &mdash; Performance Dashboard</h1>
  <span>Última actualización: 2026-03-09 00:07</span>
</header>

<div class="filters">

  <select id="fSite" onchange="render()">

</div>

<div id="kpis" class="kpis"></div>

<div class="charts">

</div>
<div class="charts">

</div>

<footer>Card Summary Performance Dashboard &mdash; Auto-refresh diario</footer>

const MONTH_ORDER = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SITES = ['MLA','MLB','MLC','MLM'];
const COLORS = ['#FFE600','#444','#888','#ccc'];

// Populate month filter
const months = [...new Set(RAW.map(r => r.MonthName))].sort((a,b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b));
const fMes = document.getElementById('fMes');
months.forEach(m => { const o = document.createElement('option'); o.value = m; o.text = m; fMes.appendChild(o); });

let charts = {};

function filtered() {
  const site = document.getElementById('fSite').value;
  const mes  = document.getElementById('fMes').value;
  return RAW.filter(r =>
    (site === 'Todos' || r.SITE_ID === site) &&
    (mes  === 'Todos' || r.MonthName === mes)
  );
}

function agg(rows) {
  const d = { Prints:0,Views:0,Clicks:0,CF:0,DE:0,PPV:0,LS:0,USD_CF:0,USD_DE:0,USD_PPV:0,USD_LS:0,New:0,Old:0 };
  rows.forEach(r => {
    d.Prints += +r.Prints_Credit_Card||0;
    d.Views  += +r.Views_Credit_Card||0;
    d.Clicks += +r.Clicks_Key_Card||0;
    d.CF     += +r.Conv_CF||0;
    d.DE     += +r.Conv_DINERO_EXPRESS||0;
    d.PPV    += +r.Conv_PPV||0;
    d.LS     += +r.Conv_SELLER_LINE||0;
    d.USD_CF += +r.USD_CF||0;
    d.USD_DE += +r.USD_DINERO_EXPRESS||0;
    d.USD_PPV+= +r.USD_PPV||0;
    d.USD_LS += +r.USD_SELLER_LINE||0;
    d.New    += +r.New_Users||0;
    d.Old    += +r.Old_Users||0;
  });
  d.Conv = d.CF+d.DE+d.PPV+d.LS;
  d.USD  = d.USD_CF+d.USD_DE+d.USD_PPV+d.USD_LS;
  d.CTR  = d.Prints>0 ? (d.Clicks/d.Prints*100).toFixed(2) : 0;
  d.CVR  = d.Clicks>0 ? (d.Conv/d.Clicks*100).toFixed(2) : 0;
  return d;
}

function fmt(n) { return Number(n).toLocaleString('es-AR'); }
function fmtUSD(n) { return '$' + Number(n).toLocaleString('es-AR', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function mkChart(id, type, labels, datasets, opts={}) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), { type, data: {labels, datasets}, options: {responsive:true, plugins:{legend:{position:'bottom'}}, ...opts} });
}

function render() {
  const rows = filtered();
  const total = agg(rows);

  // KPIs
  document.getElementById('kpis').innerHTML = [
    ['Views', fmt(total.Views), 'Credit Card'],
    ['Clicks', fmt(total.Clicks), 'Key Card'],
    ['Conversiones', fmt(total.Conv), 'Total'],
    ['USD Originado', fmtUSD(total.USD), 'Total'],
    ['CTR', total.CTR + '%', 'Clicks/Views'],
    ['CVR', total.CVR + '%', 'Conv/Clicks'],
    ['New Users', fmt(total.New), ''],
    ['Old Users', fmt(total.Old), ''],
  ].map(([l,v,s]) => `<div class="kpi"><div class="label">${l}</div><div class="value">${v}</div><div class="sub">${s}</div></div>`).join('');

  // Funnel chart
  const funnelData = SITES.map(s => agg(rows.filter(r => r.SITE_ID===s)));
  mkChart('chartFunnel', 'bar', SITES, [
    {label:'Views', data: funnelData.map(d=>d.Views), backgroundColor:'#444'},
    {label:'Clicks', data: funnelData.map(d=>d.Clicks), backgroundColor:'#FFE600'},
    {label:'Conv', data: funnelData.map(d=>d.Conv), backgroundColor:'#888'},
  ], {scales:{x:{stacked:false},y:{stacked:false}}});

  // Conv por producto
  mkChart('chartConv', 'bar', SITES, [
    {label:'CF',  data: funnelData.map(d=>d.CF),  backgroundColor:'#FFE600'},
    {label:'DE',  data: funnelData.map(d=>d.DE),  backgroundColor:'#444'},
    {label:'PPV', data: funnelData.map(d=>d.PPV), backgroundColor:'#888'},
    {label:'LS',  data: funnelData.map(d=>d.LS),  backgroundColor:'#ccc'},
  ]);

  // USD por producto
  mkChart('chartUSD', 'bar', SITES, [
    {label:'USD CF',  data: funnelData.map(d=>d.USD_CF),  backgroundColor:'#FFE600'},
    {label:'USD DE',  data: funnelData.map(d=>d.USD_DE),  backgroundColor:'#444'},
    {label:'USD PPV', data: funnelData.map(d=>d.USD_PPV), backgroundColor:'#888'},
    {label:'USD LS',  data: funnelData.map(d=>d.USD_LS),  backgroundColor:'#ccc'},
  ]);

  // New vs Old doughnut
  mkChart('chartNewOld', 'doughnut', ['New Users','Old Users'],
    [{data:[total.New, total.Old], backgroundColor:['#FFE600','#444']}]);

  // Table
  let tbody = '';
  funnelData.forEach((d,i) => {
    tbody += `<tr><td><b>${SITES[i]}</b></td><td>${fmt(d.Views)}</td><td>${fmt(d.Clicks)}</td><td>${fmt(d.Conv)}</td><td>${fmtUSD(d.USD)}</td><td>${d.CTR}%</td><td>${d.CVR}%</td></tr>`;
  });
  tbody += `<tr class="total"><td>TOTAL</td><td>${fmt(total.Views)}</td><td>${fmt(total.Clicks)}</td><td>${fmt(total.Conv)}</td><td>${fmtUSD(total.USD)}</td><td>${total.CTR}%</td><td>${total.CVR}%</td></tr>`;
  document.getElementById('tableBody').innerHTML = tbody;
}

render();
</script>
</body>
</html>
